<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agenda Musical Pro</title>
  <!-- Google Fonts Corregido -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-wrapper">
        <aside class="sidebar">
  <div class="sidebar-logo">🎵</div>

  <nav class="sidebar-nav">
    <a class="sidebar-link" data-section="lobby" onclick="showSection('lobby')">
      <i class="bi bi-people"></i>
      <span>Lobby</span>
    </a>

    <a class="sidebar-link" data-section="agenda" onclick="showSection('agenda')">
      <i class="bi bi-calendar-event"></i>
      <span>Agenda</span>
    </a>

    <a class="sidebar-link" data-section="repertorio" onclick="showSection('repertorio')">
      <i class="bi bi-music-note-list"></i>
      <span>Repertorio</span>
    </a>

    <a class="sidebar-link" data-section="calendario" onclick="showSection('calendario')">
      <i class="bi bi-calendar3"></i>
      <span>Calendario</span>
    </a>
  </nav>
</aside>

     <main class="main-content">
        <div class="agenda-wrapper">
        <header class="text-center mb-5">
          <h1 class="fs-2 fw-bold">🎵 JAMROOM</h1>
          <p class="subtitle">Planificador de ensayos</p>
        </header>

        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
          <button id="btnAgregarDia" class="btn btn-app btn-edicion-ui">
            <i class="bi bi-plus-lg"></i> Agregar día
          </button>

          <button id="btnModoEdicion" class="btn btn-app">
            Modo edición
          </button>

          <button id="btnSalirEdicion" class="btn btn-app-outline d-none">
            Salir edición
          </button>
        </div>

        <div id="lobbySection" style="display:none;">
          <h2>Recordatorios</h2>
          <div id="weeklyEvents" class="card mb-4"></div>

          <h2>Importante!</h2>
          <div id="importantBox">
            <textarea id="importantText" class="form-control mb-2" placeholder="Escribí algo importante..."></textarea>

            <input type="file" id="importantFile" class="important-edit">

            <div class="d-flex gap-2 boton-edicion-ui">
              <button id="btnSaveImportant" class="important-edit" onclick="saveImportant()">Guardar</button>
              <button id="btnDeleteImportant" class="important-edit" onclick="deleteImportant()">Borrar</button>
            </div>

            <div id="importantPreview" class="mt-2"></div>
          </div>

        </div>

        <!-- Agenda principal -->
        <!-- SECCIÓN AGENDA -->
        <div id="agendaSection">
          <div id="agenda" class="mt-4"></div>
        </div>

        <!-- SECCIÓN CALENDARIO (NUEVA) -->
        <div id="calendarSection" style="display:none;">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-app" onclick="prevMonth()">⬅</button>
            <h3 id="monthYear" class="m-0"></h3>
            <button class="btn btn-app" onclick="nextMonth()">➡</button>
          </div>

          <div id="weekDays" class="calendar-weekdays">
            <div>Dom</div>
            <div>Lun</div>
            <div>Mar</div>
            <div>Mié</div>
            <div>Jue</div>
            <div>Vie</div>
            <div>Sáb</div>
          </div>

          <div id="calendarDays" class="calendar-grid"></div>

        </div>
        <!-- SECCIÓN REPERTORIO -->
        <div id="repertorioSection" style="display:none;">

          <h2 class="mb-3">Repertorio</h2>

          <div id="repertorioGlobalList"></div>

          <div class="mt-3 d-flex gap-2 boton-edicion">
            <button class="btn btn-app btn-rep-action"
              onclick="agregarCancionGlobal()">
              ➕
            </button>

            <button class="btn btn-delete-song btn-rep-action"
              onclick="guardarRepertorioGlobal()">
              💾
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

<!-- Modal nueva fecha -->
<div class="modal fade" id="modalNuevaFecha" tabindex="-1" role="dialog" aria-labelledby="modalNuevaFechaLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalNuevaFechaLabel">Agregar nueva fecha</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="inputFechaModal" class="form-label">Seleccionar fecha:</label>
          <input type="date" class="form-control" id="inputFechaModal" />
        </div>
        <div class="mb-3">
          <label for="inputDescripcionModal" class="form-label">Descripción:</label>
          <input type="text" class="form-control" id="inputDescripcionModal" placeholder="Ensayo, Concierto, etc." />
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm d-none"
          id="btnEliminarFecha">
          <i class="bi bi-trash"></i> Eliminar evento
        </button>

        <div class="d-flex gap-2">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" id="btnGuardarFecha">
            Guardar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Músicos -->
<div class="modal fade" id="modalMusicos" tabindex="-1" aria-labelledby="modalMusicosLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalMusicosLabel">Asignar Músicos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body" id="bodyModalMusicos">
        <!-- Aquí se cargará dinámicamente el contenido -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="guardarMusicosBtn">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal para editar músicos por instrumento -->
<div class="modal fade" id="modalEditorInstrumentos" tabindex="-1" aria-labelledby="editorInstrumentosLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar músicos por instrumento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="bodyEditorInstrumentos"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="guardarInstrumentosBtn">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

  <!-- Modal Repertorio -->
  <div class="modal fade" id="modalRepertorio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar Repertorio</h5>
        </div>

        <div class="modal-body" id="bodyModalRepertorio">

          <div class="mb-2">
            <label>Título</label>
            <input type="text" id="repTitulo" class="form-control">
          </div>

          <div class="mb-2">
            <label>Nota</label>
            <textarea id="repNota" class="form-control"></textarea>
          </div>

          <div class="mb-2">
            <label>Link de YouTube</label>
            <input type="text" id="repYoutube" class="form-control" placeholder="https://youtube.com/...">
          </div>

        </div>

        <div class="modal-footer">
          <button id="guardarRepertorioBtn" class="btn btn-delete-song">
            💾
          </button>

        </div>
      </div>
    </div>
  </div>
  
  <!-- Modal para reproducir YouTube (añadido desde tu primer código) -->
  <div class="modal fade" id="modalYoutubePlayer" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Reproduciendo video</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="cerrarYoutubeModal()"></button>
        </div>
        <div class="modal-body p-0">
          <div class="ratio ratio-16x9">
            <iframe id="youtubeFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- Modal para Calendario -->
  <div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Evento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <label>Horario</label>
          <input type="time" id="eventTime" class="form-control mb-2">

          <label>Descripción</label>
          <input type="text" id="eventText" class="form-control">
        </div>

        <div class="modal-footer">
          <button class="btn btn-danger" onclick="deleteEvent()">Eliminar</button>
          <button class="btn btn-success" onclick="saveEvent()">Guardar</button>
        </div>

      </div>
    </div>
  </div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net"></script>
<script>
  window.jsPDF = window.jspdf.jsPDF;
</script>
<script src="js/scripts.js"></script>
</body>
</html>
